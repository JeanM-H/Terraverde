<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — TerraVerde</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20128%20128'%3E%3Ccircle%20cx='64'%20cy='64'%20r='60'%20fill='%231d3b7a'/%3E%3Ctext%20x='50%25'%20y='55%25'%20font-size='72'%20text-anchor='middle'%20fill='%23fff'%20font-family='Arial'%3E%E2%96%A8%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

<div class="auth-split">
  <!-- PANEL IZQUIERDO -->
  <div class="auth-left">
    <a href="index.html" class="nav-logo"><span class="logo-dot">◈</span> TerraVerde</a>
    <div class="auth-visual-box">
      <div class="auth-lot-map">
        <div class="lot vendido"></div><div class="lot disponible"></div><div class="lot reservado"></div>
        <div class="lot disponible"></div><div class="lot vendido"></div><div class="lot disponible"></div>
        <div class="lot reservado"></div><div class="lot vendido"></div><div class="lot disponible"></div>
      </div>
      <h2>Gestiona tus lotes desde cualquier lugar</h2>
      <p>Accede a tu estado de cuenta, historial de pagos y solicitudes PQRS en tiempo real.</p>
    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="auth-right">
    <div class="auth-box">
      <h1>Bienvenido</h1>
      <p class="auth-sub">Ingresa con tu cuenta registrada para continuar.</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" placeholder="correo@ejemplo.com" autocomplete="email" required>
          <span class="field-error" id="emailErr"></span>
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="input-icon" onclick="togglePw('password')" aria-label="Ver contraseña">👁</button>
          </div>
          <span class="field-error" id="passwordErr"></span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
          <label class="checkbox-label"><input type="checkbox" id="remember"> Recordarme</label>
          <a href="recuperar.html" class="link-subtle">¿Olvidaste tu contraseña?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Ingresar →</button>
      </form>

      <div class="auth-divider"><span>o prueba una cuenta demo</span></div>
      <div class="demo-btns">
        <button class="demo-btn" onclick="loginDemo('admin')">👤 Administrador</button>
        <button class="demo-btn" onclick="loginDemo('cliente')">👤 Cliente</button>
      </div>

      <p class="auth-footer">¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a></p>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="js/app.js"></script>
<script>
// Redirigir si ya tiene sesión
if (Auth.getSession()) window.location.href = 'dashboard.html';

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  try {
    const res = await fetch('/api/login', { 
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' }, 
      body: JSON.stringify({ email, password }) 
    });
    const data = await res.json();

    if (data.ok && data.token) {
      // Guarda el usuario en LocalStorage
      localStorage.setItem('tv_session', JSON.stringify(data.user));
      // Guarda el token JWT para futuros requests
      localStorage.setItem('tv_token', data.token);
      Toast.show('Sesión iniciada correctamente', 'success');
      window.location.href = 'dashboard.html';
    } else if (res.ok && data.user) {
      // Fallback para backend sin JWT todavía
      localStorage.setItem('tv_session', JSON.stringify(data.user || data));
      window.location.href = 'dashboard.html';
    } else {
      Toast.show(data.error || 'Credenciales incorrectas', 'error');
    }
  } catch (err) {
    Toast.show('No se pudo conectar al servidor', 'error');
    console.error('Error al llamar /api/login:', err);
  }
});

function loginDemo(role) {
  const users = Users.getAll();
  const user  = users.find(u => u.role === role);
  if (!user) { Toast.show('Datos demo no disponibles', 'error'); return; }
  localStorage.setItem('tv_session', JSON.stringify(user));
  Toast.show('Sesión demo iniciada como ' + (role === 'admin' ? 'Administrador' : 'Cliente'), 'success');
  setTimeout(() => window.location.href = 'dashboard.html', 800);
}

// Validación en tiempo real
document.getElementById('email').addEventListener('blur', function() {
  if (this.value && !Validate.email(this.value)) Validate.setError('emailErr', 'Formato de correo inválido');
  else Validate.clearError('emailErr');
});
</script>
</body>
</html>
