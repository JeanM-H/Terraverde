<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pagos — TerraVerde</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20128%20128'%3E%3Ccircle%20cx='64'%20cy='64'%20r='60'%20fill='%231d3b7a'/%3E%3Ctext%20x='50%25'%20y='55%25'%20font-size='72'%20text-anchor='middle'%20fill='%23fff'%20font-family='Arial'%3E%E2%96%A8%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo"><span class="logo-dot">◈</span> TerraVerde</a>
    <!-- ...otros links si lo necesitas... -->
  </div>
</nav>

<section class="page-hero">
  <div class="container">
    <h1>Pagos</h1>
    <p>Consulta tu estado de cuenta y realiza pagos en línea.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div id="pagosTable"></div>
  </div>
</section>

<div id="toastContainer" class="toast-container"></div>
<script src="js/app.js"></script>
<script>
async function cargarPagos() {
  try {
    const res = await fetch('/api/pagos', {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('tv_token') }
    });
    const pagos = await res.json();
    renderPagos(pagos);
  } catch {
    Toast.show('Error al cargar pagos', 'error');
  }
}

function renderPagos(pagos) {
  const cont = document.getElementById('pagosTable');
  if (!pagos.length) {
    cont.innerHTML = '<div class="empty-state">No tienes pagos registrados.</div>';
    return;
  }
  cont.innerHTML = `
    <table class="table">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Monto</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        ${pagos.map(p => `
          <tr>
            <td>${p.fecha}</td>
            <td>${Fmt.money(p.monto)}</td>
            <td>${p.estado}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

cargarPagos();
</script>
</body>
</html>
